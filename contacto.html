    <header>
        <h1>Contacto</h1>
        <p>Completá el formulario para comunicarte conmigo</p>
    </header>

    
    <main class="main">

        <section>
            <h2>Formulario de Contacto</h2>

            <form action="#" method="POST">

                <label for="nombre">Nombre y Apellido</label>
                <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tunombre@email.com">

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="387-8739129" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Escribí tu consulta..."></textarea>

                <label>
                    <input type="checkbox" required> Acepto los términos
                </label>

                <button type="submit">Enviar</button>

            </form>
        </section>

    </main>
