
<!DOCTYPE html>
<html lang = "es">
<head>
<meta charset="UTF-8">
<meta name = "viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Formulario de Contacto</title>
</head>
<body>
<main>
        <!-- FORMULARIO -->

<form action="#" method="POST">

<h2>FORMULARIO</h2>
<label for="nombre">NOMBRE Y APELLIDO </label>
<input type="text" id="nombre" name="nombre"
required minlength="2" placeholder="Tu nombre">

<label for="email">Email </label>
<input type="email" id="email" name="email"
required placeholder="tu@email.com">

<label for="telefono">Teléfono </label>
<input type="tel" id="telefono" name="telefono"
placeholder="387-8739129" pattern="[0-9]{3}-[0-9]{7}">

<label for="mensaje">Mensaje </label>
<textarea id="mensaje" name="mensaje" rows="5"
required minlength="10"

placeholder="Escribí tu consulta..."></textarea>

<label><input type="checkbox" required> Acepto los términos</label>
<button type="submit">Enviar</button>

</form>
</main>
<footer>
    <p>&copy; 2026 Isaias Ramses Casasola Duran</p>
    <p>Practicas Profesionalizantes II · Programador Junior · TP1</p>
</footer>
<style>
    /* Borde verde cuando el campo es válido */

input:valid {

border: 2px solid #16A34A;

background-color: #F0FFF4;

}

/* Borde rojo cuando el campo es inválido */

input:invalid {

border: 2px solid #DC2626;

background-color: #FEF2F2;

}

/* Solo mostrar error DESPUÉS de que el usuario interactúe */

input:not(:placeholder-shown):invalid {

border: 2px solid #DC2626;

}

/* Estilizar el campo con foco */

input:focus {

outline: none;

border-color: #2E75B6;

box-shadow: 0 0 0 3px rgba(46, 117, 182, 0.2);
}
</style>
</body>
</html>
