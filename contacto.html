
<!DOCTYPE html>
<html lang = "es">
<head>
<meta charset="UTF-8">
<meta name = "viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Formulario de Contacto</title>
</head>
<body>
    <header>
    <h1>Formulario de Contacto</h1>
</header>

<nav>
    <a href="index.html">Inicio</a>
</nav>
<main>
        <!-- FORMULARIO -->

<form action="#" method="POST">

<label for="nombre">NOMBRE Y APELLIDO </label>
<input type="text" id="nombre" name="nombre"
required minlength="3" placeholder="Tu nombre">

<label for="email">Email </label>
<input type="email" id="email" name="email"
required placeholder="tunombre@email.com">

<label for="telefono">Teléfono </label>
<input type="tel" id="telefono" name="telefono"
placeholder="387-8739129" pattern="[0-9]{3}-[0-9]{7}">

<label for="mensaje">Mensaje </label>
<textarea id="mensaje" name="mensaje" rows="5"
required minlength="10"

placeholder="Escribí tu consulta..."></textarea>

<label for="terminos">
    <input type="checkbox" id="terminos" name="terminos" value="aceptado" required>
    Acepto los terminos
</label>
<button type="submit">Enviar</button>

</form>
</main>
<footer>
    <p>&copy; 2026 Isaias Ramses Casasola Duran</p>
    <p>Practicas Profesionalizantes II · Programador Junior · TP1</p>
</footer>
<style>
    /* Borde verde cuando el campo es válido */

input:not(:placeholder-shown):valid {
    border: 2px solid #16A34A;
    background-color: #f0fff4;

}

/* Borde rojo cuando el campo es inválido */

input:not(:placeholder-shown):invalid {

border: 2px solid #DC2626;

background-color: #FEF2F2;

}

/* Solo mostrar error DESPUÉS de que el usuario interactúe */

input:not(:placeholder-shown):invalid {

border: 2px solid #DC2626;

}

/* Estilizar el campo con foco */

input:focus {

outline: none;

border-color: #2E75B6;

box-shadow: 0 0 0 3px rgba(46, 117, 182, 0.2);
}
/* Estructura */
 /* === RESET BASICO ===*/
*  {
    margin: 0;
    padding: 0;
    box-sizing: border-box
}
/* === TIPOGRAFIA ===*/
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #333333;
    background-color: rgba(102, 163, 255, 0.63);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== HEADER ===== */

header {

background-color: #156dc0a6;

color: white;

text-align: center;

padding: 1rem; 

}

/* ===== NAV ===== */

nav {

background-color: #154bc0fb;

padding: 1rem;

text-align: center;

}

nav a {

color: #000000;
}


/* ===== FOOTER ===== */

footer {

background-color: #000000;

color: white;

text-align: center;

padding: 1rem;

}
/* ===== MAIN ===== */

main {

flex: 1;
display: flex;
justify-content: center;
align-items: center;
}
form {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 15px;
}
textarea:not(:placeholder-shown):valid {
    border: 2px solid #16A34A
}
textarea:not(:placeholder-shown):invalid {
    border: 2px solid #DC2626
}
input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #CCC;
}
button {
    background-color: #156dc0;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background-color: #0e4a87
}
label{
    font-weight: bold;
}
h2 {
    text-align: center;
    margin-bottom:10px;
}

</style>
</body>
</html>
