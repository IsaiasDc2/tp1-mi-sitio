<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale1.0">
<title>Mi primer sitio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header>
    <h1>ISAIAS RAMSES CASASOLA DURAN</h1>
    <P>Estudiante de Analisis de Sistemas y Desarrollo de Software - Salta Capital, Argentina</P>
</header>
<main>
    
<section>
    <form action="/registro" method="POST">

<label for="nombre">Nombre completo:</label>

<input type="text" id="nombre" name="nombre"

placeholder="Ej: tu nombre" required minlength="3">

<label for="email">Correo electrónico:</label>

<input type="email" id="email" name="email"

placeholder="tunombre@mail.com" required>

<label for="edad">Edad:</label>

<input type="number" id="edad" name="edad"

min="16" max="99" required>

<label for="pass">Contraseña:</label>

<input type="password" id="pass" name="password"

minlength="8" required>

<label for="carrera">Carrera:</label>

<select id="carrera" name="carrera" required>

<option value="">-- Seleccioná --</option>

<option value="sistemas">Análisis de Sistemas</option>

<option value="redes">Redes</option>

</select>

<button type="submit">Registrarse</button>

</form>

<style>
    /* === RESET BASICO ===*/
*  {
    margin: 0;
    padding: 0;
    box-sizing: border-box
}
/* === TIPOGRAFIA BASE ===*/
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #333333;
    background-color: rgba(102, 163, 255, 0.63)
}
/* ===== HEADER ===== */

header {

background-color: #156dc0a6;

color: white;

text-align: center;

padding: 1rem; 

}

/* ===== NAV ===== */

nav {

background-color: #154bc0fb;

padding: 1rem;

text-align: center;

}

nav a {

color: #000000;
}


/* ===== FOOTER ===== */

footer {

background-color: #000000;

color: white;

text-align: center;

padding: 1rem;

}
/* ===== MAIN ===== */

main {

max-width: 900px;

margin: 0 auto;

padding: 2rem;

}

/* ===== SECCIONES ===== */

section {

background-color: rgb(255, 255, 255);

border-radius: 8px; 

padding: 2rem;

margin-bottom: 2rem;

box-shadow: 0 2px 5px rgba(0, 0, 0, 0); 

}
ul, ol {

padding-left: 2rem;

margin-bottom: 1rem;

}
img{
display:block;
margin:15px auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
</style>
</html>
